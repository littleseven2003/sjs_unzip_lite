# 构建与发布工作流
# 基于 design.md 第 21 节（Sidecar 打包）与 AGENTS.md 第三节（分支与发布）
#
# 触发：
#   - push 到 dev / main：仅构建产物，验证可编译，不发布。
#   - push tag v*：构建产物并上传到 GitHub Release（预发布）。
name: build-release

on:
  push:
    branches:
      - dev
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"
          - platform: macos-14
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 / 发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'dev-build' }}"
          prerelease: ${{ startsWith(github.ref, 'refs/tags/v') }}
          args: ${{ matrix.args }}